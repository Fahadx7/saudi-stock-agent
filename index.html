<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B0F1E;--card:#131829;--border:#1E2540;--accent:#00C8FF;--green:#00E676;--red:#FF5252;--gold:#FFD740;--text:#FFF;--muted:#7B8AB8;--surface:#1A2038}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:99}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badges{display:flex;gap:6px}.badge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-accent{background:rgba(0,200,255,.13);color:var(--accent)}.badge-gold{background:rgba(255,215,64,.13);color:var(--gold)}.badge-green{background:rgba(0,230,118,.13);color:var(--green)}
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.tab{background:transparent;color:var(--muted);border:none;padding:8px 16px;border-radius:8px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab.active{background:var(--accent);color:#000}
.container{padding:12px;max-width:800px;margin:0 auto}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:12px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.metric{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;text-align:center}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:4px}.metric-val{font-size:24px;font-weight:800}
.sector-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.sector-tile{border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:transform .2s}
.sector-tile:hover{transform:scale(1.03)}
.sector-name{font-size:11px;font-weight:600;margin-bottom:2px}.sector-val{font-size:15px;font-weight:800}.sector-count{font-size:10px;color:var(--muted)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.stock-name{font-size:12px;font-weight:600}.stock-code{font-size:10px;color:var(--muted)}.stock-price{font-size:12px;font-weight:700}.stock-change{font-size:11px;font-weight:700}
.green{color:var(--green)}.red{color:var(--red)}.gold{color:var(--gold)}.accent{color:var(--accent)}.muted{color:var(--muted)}
select{width:100%;padding:12px 14px;background:var(--surface);border:2px solid var(--accent);border-radius:10px;color:var(--text);font-size:14px;font-weight:700;font-family:inherit}
select option{background:var(--card);color:var(--text)}
.info-bar{background:linear-gradient(135deg,#1A237E,#311B92);border-radius:14px;padding:18px;margin-bottom:12px}
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
.info-item{text-align:center}.info-label{font-size:11px;color:#B388FF}.info-val{font-size:16px;font-weight:800}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px}
.ind{background:var(--surface);padding:8px;border-radius:8px;text-align:center;border:1px solid var(--border)}
.ind-label{font-size:9px;color:var(--muted);margin-bottom:3px;text-transform:uppercase}.ind-val{font-size:14px;font-weight:800}
.input-group{margin-bottom:10px}.input-label{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600;display:block}
.input-field{width:100%;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;box-sizing:border-box}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.result-box{background:linear-gradient(135deg,#4527A0,#6A1B9A);border-radius:14px;padding:18px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.result-label{font-size:11px;opacity:.7}.result-val{font-size:20px;font-weight:800}
.ratio{font-size:36px;font-weight:900;color:var(--gold)}
.advice-box{background:rgba(255,255,255,.1);padding:12px;border-radius:8px;margin-top:12px;text-align:center;font-size:14px;font-weight:700}
.filter-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{border-radius:8px;padding:8px 14px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.filter-btn.off{background:var(--surface);border:1.5px solid var(--border);color:var(--muted)}
.filter-btn.on{background:rgba(0,200,255,.13);border:1.5px solid var(--accent);color:var(--accent)}
.sm-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;display:inline-block;margin-left:3px}
.watch-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.watch-right{display:flex;align-items:center;gap:10px}
.rm-btn{background:rgba(255,82,82,.13);border:none;color:var(--red);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:13px}
.empty{text-align:center;padding:30px;color:var(--muted)}
.ai-btn{width:100%;padding:12px;border:none;border-radius:10px;color:#000;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer}
.ai-result{font-size:13px;line-height:1.9;white-space:pre-wrap}
.warn-box{margin-top:12px;padding:10px;background:rgba(255,82,82,.1);border-radius:8px;font-size:11px;color:var(--red);text-align:center}
.watch-btn{background:rgba(255,215,64,.2);border:1px solid var(--gold);color:var(--gold);padding:6px 14px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.section-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:12px}
.refresh-btn{background:rgba(0,200,255,.13);border:1px solid var(--accent);color:var(--accent);padding:6px 14px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.refresh-btn:disabled{opacity:.4;cursor:wait}
.loading-bar{height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);background-size:200%;animation:loadSlide 1.5s infinite}
@keyframes loadSlide{0%{background-position:200% 0}100%{background-position:-200% 0}}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:6px}
.status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1.5s infinite}.status-dot.sim{background:var(--gold)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.prog{font-size:11px;color:var(--accent);text-align:center;padding:6px}
.err-banner{padding:8px 16px;background:rgba(255,82,82,.15);color:var(--red);font-size:12px;text-align:center}
.search-box{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;margin-bottom:12px;box-sizing:border-box}
.stock-list{max-height:400px;overflow-y:auto}
.stock-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s}
.stock-row:hover{background:rgba(0,200,255,.05);border-radius:8px;padding:8px 6px}
.signal-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px}
.signal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.signal-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800}
.signal-reasons{font-size:11px;color:var(--muted);line-height:1.8}
.signal-reason{display:inline-block;background:var(--surface);padding:2px 8px;border-radius:12px;margin:2px;font-size:10px}
.signal-meter{height:6px;border-radius:3px;background:var(--surface);overflow:hidden;margin-top:6px}
.signal-meter-fill{height:100%;border-radius:3px;transition:width .3s}
.signal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.signal-stat{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px;text-align:center}
.signal-stat-num{font-size:22px;font-weight:800}
.signal-stat-label{font-size:10px;color:var(--muted);margin-top:2px}
@media(max-width:500px){.two-col,.calc-grid,.info-grid{grid-template-columns:1fr}.result-grid{grid-template-columns:1fr}}
</style>

<script>
const e=React.createElement,{useState,useEffect,useCallback,useMemo}=React;

// All known Saudi main market stock codes
const ALL_CODES=[1010,1020,1030,1040,1050,1060,1080,1090,1111,1120,1140,1150,1180,1182,1183,1201,1202,1210,1211,1212,1213,1214,1301,1302,1303,1304,1320,1321,1322,2001,2002,2010,2020,2030,2040,2050,2060,2070,2080,2081,2082,2083,2090,2100,2110,2120,2130,2140,2150,2160,2170,2180,2190,2200,2210,2220,2222,2223,2230,2240,2250,2270,2280,2281,2282,2283,2290,2300,2310,2320,2330,2340,2350,2360,2370,2380,2381,2382,3001,3002,3003,3004,3005,3007,3008,3010,3020,3030,3040,3050,3060,3080,3090,3091,3092,4001,4002,4003,4004,4005,4006,4007,4008,4009,4010,4011,4012,4013,4014,4015,4020,4030,4031,4040,4050,4051,4061,4070,4071,4080,4081,4082,4090,4100,4110,4130,4140,4141,4142,4150,4160,4161,4162,4163,4164,4170,4180,4190,4191,4192,4200,4210,4220,4230,4240,4250,4260,4261,4262,4270,4280,4290,4291,4292,4300,4310,4320,4321,4322,4323,5110,5120,6001,6002,6004,6010,6012,6013,6014,6015,6020,6040,6050,6060,6070,6090,7010,7020,7030,7040,7200,7201,7202,7203,7204,8010,8012,8020,8030,8040,8050,8060,8070,8100,8120,8150,8160,8170,8180,8190,8200,8210,8230,8240,8250,8260,8270,8280,8300,8310,8311,9506,9507,9508,9509,9510,9511,9512,9513,9514,9515,9516,9517,9518,9519,9520,9521,9522,9523,9524,9525,9526,9527,9528,9529,9530,9531,9532,9533,9534,9535,9536,9537,9538,9539,9540,9541,9542,9543,9544,9545,9546,9547,9548,9549,9550,9551,9552,9553,9554,9555,9556,9557,9558,9559,9560,9561,9562,9563,9564,9565,9566,9567,9568,9569,9570,9571,9572,9573,9574,9575,9576,9577,9578,9579,9580,9581,9582,9583,9584,9585,9586,9587,9588,9589,9590,9591,9592,9593,9594,9595,9596,9597,9598,9599,9600,9601,9602,9603,9604,9605,9606,9607,9608,9609,9610,9611,9612,9613,9614,9615,9616,9617,9618,9619,9620,9621,9622,9623,9624,9625,9626,9627,9628,9629,9630,9631,9632,9633,9634,9635,9636,9637,9638,9639,9640,9641,9642];

const PROXIES=["https://api.allorigins.win/raw?url=","https://corsproxy.io/?url=","https://api.codetabs.com/v1/proxy?quest=","https://proxy.cors.sh/?url="];
let activeProxy=0;
let debugLog=[];

function addLog(msg){debugLog.push(new Date().toLocaleTimeString()+": "+msg);if(debugLog.length>50)debugLog.shift()}

async function pFetch(url){
  for(let i=0;i<PROXIES.length;i++){
    const pi=(activeProxy+i)%PROXIES.length;
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),15000);
      const fullUrl=PROXIES[pi]+encodeURIComponent(url);
      addLog("trying proxy "+pi+": "+PROXIES[pi].substring(0,30));
      const r=await fetch(fullUrl,{signal:ctrl.signal});
      clearTimeout(timer);
      if(r.ok){
        const text=await r.text();
        try{const json=JSON.parse(text);activeProxy=pi;addLog("proxy "+pi+" OK");return json}
        catch(pe){addLog("proxy "+pi+" bad JSON")}
      }else{addLog("proxy "+pi+" status "+r.status)}
    }catch(x){addLog("proxy "+pi+" err: "+x.message)}
  }
  addLog("all proxies failed for: "+url.substring(0,60));
  return null
}

async function yfChart(code){
  const d=await pFetch("https://query1.finance.yahoo.com/v8/finance/chart/"+code+".SR?interval=1d&range=3mo");
  if(!d)return null;
  const res=d.chart?.result?.[0];if(!res)return null;
  const meta=res.meta;const q=res.indicators?.quote?.[0];if(!q)return null;
  const closes=q.close?.filter(Boolean);const vols=q.volume?.filter(Boolean);
  return{price:meta?.regularMarketPrice,prev:meta?.chartPreviousClose,closes:closes||[],
    volume:vols?vols.reduce((a,b)=>a+b,0)/vols.length:0,name:meta?.shortName||meta?.symbol}
}

async function yfBatchQuotes(codes){
  const syms=codes.map(c=>c+".SR").join(",");
  const d=await pFetch("https://query1.finance.yahoo.com/v7/finance/quote?symbols="+syms);
  if(d&&d.quoteResponse&&d.quoteResponse.result)return d.quoteResponse.result;
  return null
}

function calcRSI(p){if(!p||p.length<15)return 50;let g=0,l=0;for(let i=p.length-14;i<p.length;i++){const d=p[i]-p[i-1];if(d>0)g+=d;else l-=d}if(l===0)return 100;return 100-(100/(1+g/l))}
function calcMACD(p){if(!p||p.length<26)return 0;const ema=(d,n)=>{const k=2/(n+1);let e=d[0];for(let i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e};return ema(p.slice(-12),12)-ema(p.slice(-26),26)}

// === SIGNAL ENGINE ===
function genSignal(s){
  if(!s||!s.price)return null;
  const rsi=s.rsi,macd=s.macd,change=s.change,price=s.price,h52=s.high52,l52=s.low52;
  let score=0;const reasons=[];

  // RSI signals
  if(rsi!==null&&rsi!==undefined){
    if(rsi<25){score+=3;reasons.push("RSI تشبع بيعي شديد ("+rsi.toFixed(0)+")")}
    else if(rsi<30){score+=2;reasons.push("RSI تشبع بيعي ("+rsi.toFixed(0)+")")}
    else if(rsi>75){score-=3;reasons.push("RSI تشبع شرائي شديد ("+rsi.toFixed(0)+")")}
    else if(rsi>70){score-=2;reasons.push("RSI تشبع شرائي ("+rsi.toFixed(0)+")")}
    else if(rsi>45&&rsi<55){score+=0.5;reasons.push("RSI محايد ("+rsi.toFixed(0)+")")}
  }

  // MACD signals
  if(macd!==null&&macd!==undefined){
    if(macd>0.5){score+=2;reasons.push("MACD إيجابي قوي")}
    else if(macd>0){score+=1;reasons.push("MACD إيجابي")}
    else if(macd<-0.5){score-=2;reasons.push("MACD سلبي قوي")}
    else if(macd<0){score-=1;reasons.push("MACD سلبي")}
  }

  // Momentum
  if(change>3){score+=2;reasons.push("زخم صعودي قوي +"+change.toFixed(1)+"%")}
  else if(change>1){score+=1;reasons.push("زخم صعودي +"+change.toFixed(1)+"%")}
  else if(change<-3){score-=2;reasons.push("ضغط بيعي قوي "+change.toFixed(1)+"%")}
  else if(change<-1){score-=1;reasons.push("ضغط بيعي "+change.toFixed(1)+"%")}

  // 52-week position
  if(h52&&l52&&h52>l52){
    const pos=(price-l52)/(h52-l52);
    if(pos<0.2){score+=2;reasons.push("قرب أدنى 52 أسبوع")}
    else if(pos>0.9){score-=1;reasons.push("قرب أعلى 52 أسبوع")}
  }

  // Volume spike
  if(s.volume&&s.volume>5000000){score+=1;reasons.push("حجم تداول عالي")}

  // Classify
  let signal,color,icon,strength;
  if(score>=4){signal="شراء قوي";color="#00E676";icon="🟢";strength=5}
  else if(score>=2){signal="شراء";color="#00E676";icon="🟢";strength=4}
  else if(score>=1){signal="شراء خفيف";color="#81C784";icon="🟡";strength=3}
  else if(score>-1){signal="انتظار";color="#FFD740";icon="🟡";strength=2}
  else if(score>-2){signal="بيع خفيف";color="#FF8A65";icon="🟠";strength=1}
  else{signal="بيع";color="#FF5252";icon="🔴";strength=0}

  return{signal,color,icon,score,strength,reasons}
}

function MC({data,color,h,w}){h=h||40;w=w||120;if(!data||data.length<2)return null;const mn=Math.min(...data),mx=Math.max(...data),rn=mx-mn||1;const pts=data.map((v,i)=>(i/(data.length-1))*w+","+(h-((v-mn)/rn)*h)).join(" ");return e("svg",{width:w,height:h,style:{display:"block",maxWidth:"100%"}},e("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:"1.5",strokeLinejoin:"round"}))}
function Sp({data,pos}){return e(MC,{data:(data||[]).slice(-20),color:pos?"#00E676":"#FF5252",h:28,w:60})}

function mapSector(s){
  if(!s)return"أخرى";
  const m={"Banks":"البنوك","Energy":"الطاقة","Basic Materials":"المواد الأساسية","Industrials":"الصناعة","Consumer Cyclical":"التجزئة","Consumer Defensive":"الأغذية","Healthcare":"الصحة","Financial Services":"الخدمات المالية","Real Estate":"العقار","Communication Services":"الاتصالات","Technology":"التقنية","Utilities":"المرافق","Insurance":"التأمين"};
  for(const[k,v]of Object.entries(m))if(s.includes(k))return v;
  if(s.includes("Telecommunication"))return"الاتصالات";
  return s.length>15?s.substring(0,15):s}

// === PAGES ===
function Dash({stocks,ld,onRef,nextIn,prog,setSectorFilter,setPg}){
const arr=Object.values(stocks);
const sp={};arr.forEach(s=>{if(!sp[s.sector])sp[s.sector]=[];sp[s.sector].push(s.change)});
const secs=Object.entries(sp).map(([n,c])=>({n,a:c.reduce((a,b)=>a+b,0)/c.length,c:c.length})).sort((a,b)=>b.c-a.c);
const g=Object.entries(stocks).sort(([,a],[,b])=>b.change-a.change).slice(0,7);
const l=Object.entries(stocks).sort(([,a],[,b])=>a.change-b.change).slice(0,7);
const up=arr.filter(s=>s.change>0).length,dn=arr.filter(s=>s.change<0).length,flat=arr.filter(s=>s.change===0).length;
return e("div",null,
  e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
    e("div",{style:{display:"flex",alignItems:"center",gap:8}},e("span",{className:"status-dot "+(arr.some(s=>s.isLive)?"live":"sim")}),e("span",{style:{fontSize:12,color:"#7B8AB8"}},arr.length+" سهم"+(nextIn>0?" · تحديث بعد "+nextIn+"ث":""))),
    e("button",{className:"refresh-btn",onClick:onRef,disabled:ld},ld?"تحديث...":"تحديث")),
